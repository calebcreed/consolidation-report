<!-- A7: Template selector - references TabletTransferComponent -->
<app-table-transfer></app-table-transfer>

<!-- A7: Template selector - references child component -->
<app-merge-check-confirmation
  [data]="confirmationData"
  (confirmed)="onConfirm($event)">
</app-merge-check-confirmation>

<!-- A8: Template pipe - references CurrencyPipe -->
<div class="amount">
  Total: {{ totalAmount | appCurrency }}
</div>

<!-- A9: Directive usage -->
<div *ngIf="showDetails" class="details">
  <span *ngFor="let item of items">{{ item.name }}</span>
</div>
